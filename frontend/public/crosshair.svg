<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- Outer border (dark) for visibility on any bg -->
  <rect x="10" y="1" width="4" height="9" fill="#000" opacity="0.25"/>
  <rect x="10" y="14" width="4" height="9" fill="#000" opacity="0.25"/>
  <rect x="1" y="10" width="9" height="4" fill="#000" opacity="0.25"/>
  <rect x="14" y="10" width="9" height="4" fill="#000" opacity="0.25"/>
  <!-- Purple cross -->
  <rect x="11" y="2" width="2" height="8" fill="#5E38F5"/>
  <rect x="11" y="14" width="2" height="8" fill="#5E38F5"/>
  <rect x="2" y="11" width="8" height="2" fill="#5E38F5"/>
  <rect x="14" y="11" width="8" height="2" fill="#5E38F5"/>
  <!-- Center dot -->
  <rect x="11" y="11" width="2" height="2" fill="#5E38F5"/>
</svg>
