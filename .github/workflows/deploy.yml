name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  check-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^backend/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -q '^frontend/'; then
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.check-changes.outputs.backend_changed == 'true'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Triggered backend deploy on Render"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: [check-changes]
    if: needs.check-changes.outputs.frontend_changed == 'true'
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Triggered frontend deploy on Vercel"
